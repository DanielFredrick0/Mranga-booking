<html>
  <body style="margin:0;padding:0;background:#f4eee2;font-family:Arial,sans-serif;color:#1f2a24;">

      <div style="background:#ffffff;border-radius:24px;padding:32px;box-shadow:0 12px 30px rgba(31,42,36,0.08);">
        <p style="margin:0 0 12px;color:#8f7a37;font-size:12px;letter-spacing:2px;text-transform:uppercase;">$site_name</p>

        <div style="font-size:40px;font-weight:700;letter-spacing:10px;background:#123524;color:#f8f1df;padding:18px 24px;border-radius:18px;text-align:center;">$code</div>
        <p style="margin:24px 0 0;line-height:1.7;">If you did not request this quote, you can safely ignore this email.</p>
      </div>
    </div>
